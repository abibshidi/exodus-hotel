<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exodus Hotel & Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#C9A84C;--gl:#E8C97A;--gd:#8A6E2F;--bg:#1A1710;--bg2:#242017;--bg3:#2E2A1E;--bg4:#383328;--cr:#F5EDD8;--cr2:#DDD0B0;--cr3:#A89870;--gn:#6DBF7A;--rd:#E07070;--bl:#7EB8E8;--pu:#B57BEA}
html,body{min-height:100vh;background:var(--bg);font-family:'Jost',sans-serif;color:var(--cr)}
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.lb{background:var(--bg2);border:1px solid var(--gd);border-top:3px solid var(--gold);border-radius:10px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.ll{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--gold);letter-spacing:4px;text-transform:uppercase}
.ls2{font-size:9px;color:var(--cr3);letter-spacing:4px;text-transform:uppercase;margin-top:4px;margin-bottom:30px}
.lfl{display:block;text-align:left;font-size:10px;color:var(--cr3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.lfi{width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--bg4);border-radius:4px;color:var(--cr);font-size:13px;font-family:'Jost',sans-serif;margin-bottom:14px}
.lfi:focus{outline:none;border-color:var(--gd)}
.lbtn{width:100%;padding:12px;background:var(--gold);color:var(--bg);border:none;border-radius:4px;font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:4px;font-family:'Jost',sans-serif}
.lbtn:hover{background:var(--gl)}.lbtn:disabled{opacity:.5;cursor:not-allowed}
.lerr{color:var(--rd);font-size:12px;margin-top:10px;min-height:16px}
#app{display:none}
.app{max-width:980px;margin:0 auto;padding-bottom:60px}
.hdr{background:var(--bg2);border-bottom:2px solid var(--gold);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.logo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
.logo-s{font-size:9px;color:var(--cr3);letter-spacing:3px;text-transform:uppercase;margin-top:1px}
.hr{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.clock{font-size:11px;color:var(--gold);background:var(--bg3);border:1px solid var(--bg4);border-radius:4px;padding:3px 10px;font-family:'Cormorant Garamond',serif;letter-spacing:1px}
.upill{background:var(--bg3);border:1px solid var(--bg4);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--cr3)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--bg4);flex-shrink:0;transition:background .3s}
.sdot.live{background:var(--gn)}.sdot.save{background:var(--gold)}.sdot.err{background:var(--rd)}
.stxt{font-size:10px;color:var(--cr3)}
.obtn{padding:3px 9px;font-size:10px;border:1px solid var(--bg4);border-radius:3px;background:transparent;color:var(--cr3);cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.obtn:hover{border-color:var(--rd);color:var(--rd)}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bg4);overflow-x:auto}
.tabs::-webkit-scrollbar{height:2px}.tabs::-webkit-scrollbar-thumb{background:var(--gd)}
.tab{flex:1;min-width:70px;padding:11px 4px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;border:none;background:none;color:var(--cr3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:'Jost',sans-serif}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}.tab:hover:not(.on){color:var(--cr)}
.content{padding:16px 20px}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px;margin-bottom:14px}
.metric{background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;padding:12px;border-top:2px solid var(--gold)}
.mlbl{font-size:9px;color:var(--cr3);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.mval{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--gold)}
.msub{font-size:11px;color:var(--cr3);margin-top:2px}
.card{background:var(--bg2);border:1px solid var(--bg4);border-radius:8px;padding:14px;margin-bottom:12px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.ct{font-size:10px;font-weight:500;color:var(--gold);letter-spacing:2px;text-transform:uppercase}
table{width:100%;font-size:12px;border-collapse:collapse;table-layout:fixed}
th{text-align:left;color:var(--cr3);font-weight:400;padding:6px 7px;border-bottom:1px solid var(--bg4);font-size:10px;letter-spacing:1px;text-transform:uppercase}
td{padding:8px 7px;border-bottom:1px solid var(--bg3);color:var(--cr);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.bok{background:#1a2a1a;color:var(--gn);border:1px solid #2a4a2a}
.blow{background:#2a2210;color:var(--gl);border:1px solid #4a3820}
.bout{background:#2a1a1a;color:var(--rd);border:1px solid #4a2a2a}
.btn{padding:6px 13px;font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--gd);border-radius:3px;background:transparent;color:var(--gold);cursor:pointer;font-family:'Jost',sans-serif;transition:background .15s}
.btn:hover{background:var(--bg4)}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-g{background:var(--gold);color:var(--bg);border-color:var(--gold)}.btn-g:hover{background:var(--gl)}
.btn-s{padding:3px 9px;font-size:10px}
.btn-d{border-color:#4a2a2a;color:var(--rd)}.btn-d:hover{background:#2a1a1a}
.btn-rd{background:#8B1A1A;color:var(--cr);border-color:#8B1A1A}.btn-rd:hover{background:#A32020}
.rgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.rc{border:1px solid var(--bg4);border-radius:6px;padding:10px 6px;text-align:center;background:var(--bg3)}
.rc.occupied{border-color:#2a4a2a;background:#1a2a1a}.rc.vacant{border-color:var(--gd);background:var(--bg2)}
.rn{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold)}
.rt{font-size:9px;color:var(--cr3);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.rg{font-size:10px;color:var(--cr2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rdot{width:6px;height:6px;border-radius:50%;margin:4px auto 0}
.rdot.occupied{background:var(--gn)}.rdot.vacant{background:var(--gold)}
input,select{font-size:13px;padding:8px 10px;width:100%;border:1px solid var(--bg4);border-radius:4px;background:var(--bg);color:var(--cr);font-family:'Jost',sans-serif}
input:focus,select:focus{outline:none;border-color:var(--gd)}
select option{background:var(--bg)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fl{font-size:10px;color:var(--cr3);letter-spacing:1px;text-transform:uppercase}
.ov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:500;align-items:flex-start;justify-content:center;padding:40px 14px;overflow-y:auto}
.ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--gd);border-top:3px solid var(--gold);border-radius:8px;padding:20px;width:100%;max-width:480px;margin:auto}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:600;color:var(--gold);margin-bottom:14px}
.pb{height:3px;border-radius:2px;background:var(--bg4);margin-top:5px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:var(--gold)}
.ww{display:flex;align-items:flex-end;gap:6px;height:76px;margin:8px 0}
.wc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wb{width:100%;border-radius:3px 3px 0 0;min-height:2px;background:var(--gold)}.wb.mt{background:var(--bg4)}
.wl{font-size:9px;color:var(--cr3);text-transform:uppercase}.wp{font-size:10px;color:var(--gold)}
.al{padding:8px 12px;border-radius:4px;font-size:12px;margin-bottom:7px;border-left:3px solid}
.alw{background:#2a2210;color:var(--gl);border-color:var(--gold)}
.alo{background:#2a1a1a;color:var(--rd);border-color:var(--rd)}
.alp{background:#1a0a2a;color:var(--pu);border-color:var(--pu)}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3);font-size:12px}
.rrow:last-child{border-bottom:none}
.pr{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg3)}
.pr:last-child{border-bottom:none}
.prv{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--gold)}
.ob{background:var(--bg);border:1px solid var(--gd);border-radius:6px;padding:12px;margin:10px 0}
.ot{font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.cnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cmo{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdh{text-align:center;font-size:9px;color:var(--cr3);letter-spacing:1px;text-transform:uppercase;padding:4px 0}
.cd{min-height:50px;border-radius:4px;border:1px solid var(--bg3);background:var(--bg);padding:4px;cursor:pointer}
.cd:hover{border-color:var(--gd)}.cd.ct{border-color:var(--gd);background:var(--bg2)}
.cd.co{opacity:.25;pointer-events:none}.cd.cbk{border-color:#1a3a5a;background:#0d1a24}
.cdn{font-size:10px;color:var(--cr3);margin-bottom:2px}.cd.ct .cdn{color:var(--gold);font-weight:500}
.cbkd{font-size:9px;color:var(--bl);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.sp{display:inline-block;width:12px;height:12px;border:2px solid var(--bg4);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.shrink-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:#1a0a2a;color:var(--pu);border:1px solid var(--pu)}
.rev-section{background:var(--bg3);border-radius:6px;padding:12px;margin-bottom:10px}
.rev-section-title{font-size:10px;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
</style>
</head>
<body>
<div id="ls">
  <div class="lb">
    <div class="ll">Exodus</div>
    <div class="ls2">Hotel &amp; Restaurant &bull; Lagos</div>
    <label class="lfl">Username</label>
    <input class="lfi" type="text" id="un" placeholder="Enter username" autocomplete="username">
    <label class="lfl">Password</label>
    <input class="lfi" type="password" id="pw" placeholder="Enter password" autocomplete="current-password">
    <button class="lbtn" id="signin">Sign in</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>
<div id="app">
  <div class="app">
    <div class="hdr">
      <div><div class="logo">Exodus</div><div class="logo-s">Hotel &amp; Restaurant &bull; Lagos</div></div>
      <div class="hr">
        <div class="clock" id="clock">--:-- WAT</div>
        <div class="upill" id="upill"></div>
        <div class="sdot" id="sdot"></div>
        <span class="stxt" id="stxt">Connecting...</span>
        <button class="obtn" id="signout">Sign out</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" data-tab="ov">Overview</button>
      <button class="tab" data-tab="cal">Calendar</button>
      <button class="tab" data-tab="bar">Bar</button>
      <button class="tab" data-tab="barsales">Bar Sales</button>
      <button class="tab" data-tab="kit">Kitchen</button>
      <button class="tab" data-tab="rev">Revenue</button>
    </div>
    <div class="content" id="mc"></div>
  </div>
</div>
<div class="ov" id="ov"><div class="modal" id="mb"></div></div>
<script>
var USERS=[
  {u:'admin',p:'exodus2024',name:'Administrator',role:'admin'},
  {u:'manager',p:'manager123',name:'Manager',role:'admin'},
  {u:'staff1',p:'staff001',name:'Staff Member',role:'staff'},
  {u:'staff2',p:'staff002',name:'Staff Member 2',role:'staff'},
  {u:'bar',p:'bar2024',name:'Bar Staff',role:'staff'},
  {u:'reception',p:'reception1',name:'Reception',role:'staff'},
];
var SU='https://sdtzxnrrxfvilyrjtfcd.supabase.co/rest/v1';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkdHp4bnJyeGZ2aWx5cmp0ZmNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTUxNDUsImV4cCI6MjA5MjYzMTE0NX0.r6m3IwQhh7j-951oMs4ownXGQs80m80NOcQOMm-BUNs';
function gh(){return {'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'};}
async function q(table,opts){
  opts=opts||{};
  var method=opts.method||'GET';
  var url=SU+'/'+table+'?select='+(opts.select||'*');
  if(opts.filter) url+='&'+opts.filter;
  if(opts.order) url+='&order='+opts.order;
  if(opts.limit) url+='&limit='+opts.limit;
  var o={method:method,headers:gh()};
  if(opts.body) o.body=JSON.stringify(opts.body);
  try{
    var r=await fetch(url,o);
    var t=await r.text();
    var d=null;try{d=t?JSON.parse(t):null;}catch(e){d=t;}
    if(!r.ok) return {data:null,error:{msg:(d&&d.message)||r.statusText}};
    return {data:Array.isArray(d)?d:(d?[d]:[]),error:null};
  }catch(e){return {data:null,error:{msg:e.message}};}
}

// Lagos time (WAT = UTC+1)
function lagosNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Africa/Lagos'}));}
function lagosDateStr(){var d=lagosNow();return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function startOfWeekLagos(){
  var d=lagosNow();
  var day=d.getDay(); // 0=Sun,1=Mon
  var diff=day===0?6:day-1; // days since Monday
  d.setDate(d.getDate()-diff);
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}
function tickClock(){
  var d=lagosNow();
  var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var h=d.getHours(),mi=('0'+d.getMinutes()).slice(-2),s=('0'+d.getSeconds()).slice(-2);
  var ampm=h>=12?'PM':'AM';h=h%12||12;
  var el=document.getElementById('clock');
  if(el) el.textContent=days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+h+':'+mi+':'+s+' '+ampm+' WAT';
}
setInterval(tickClock,1000);tickClock();

var CU=null;
var D={rooms:[],pricing:{},bookings:[],drinks:[],food:[],revenue:[],occ:[],barSales:[],shrinkage:[]};
var TAB='ov',CY=new Date().getFullYear(),CM=new Date().getMonth();
var BAR_SORT={col:'name',dir:'asc'};
var KIT_SORT={col:'name',dir:'asc'};
var f=function(n){return Number(n||0).toLocaleString('en-NG');};
var td=lagosDateStr;
var nights=function(a,b){if(!a||!b||a>=b)return 0;return Math.round((new Date(b)-new Date(a))/86400000);};
var stk=function(s,m){return s===0?'out':s<=m?'low':'ok';};
var bdg=function(s){if(s==='ok')return '<span class="badge bok">In stock</span>';if(s==='low')return '<span class="badge blow">Low</span>';return '<span class="badge bout">Out</span>';};
var bon=function(ds){return D.bookings.filter(function(b){return b.checkin<=ds&&b.checkout>ds;});};
var isAdmin=function(){return CU&&CU.role==='admin';};
function setSt(m,t){document.getElementById('stxt').textContent=m;var d=document.getElementById('sdot');d.className='sdot'+(t==='live'?' live':t==='save'?' save':t==='err'?' err':'');}

function doLogin(){
  var u=document.getElementById('un').value.trim(),p=document.getElementById('pw').value;
  var e=document.getElementById('lerr'),btn=document.getElementById('signin');
  if(!u||!p){e.textContent='Please enter username and password.';return;}
  btn.disabled=true;btn.textContent='Signing in...';e.textContent='';
  var user=null;
  for(var i=0;i<USERS.length;i++){if(USERS[i].u.toLowerCase()===u.toLowerCase()&&USERS[i].p===p){user=USERS[i];break;}}
  if(!user){e.textContent='Invalid username or password.';btn.disabled=false;btn.textContent='Sign in';return;}
  CU=user;try{sessionStorage.setItem('ex_u',JSON.stringify(user));}catch(ex){}
  showApp();
}
function doLogout(){
  CU=null;try{sessionStorage.removeItem('ex_u');}catch(e){}
  document.getElementById('app').style.display='none';
  document.getElementById('ls').style.display='flex';
  document.getElementById('pw').value='';document.getElementById('lerr').textContent='';
  document.getElementById('signin').disabled=false;document.getElementById('signin').textContent='Sign in';
}
function showApp(){
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('upill').textContent=CU.name+' ('+CU.role+')';
  loadAll();
}

async function loadAll(){
  setSt('Loading...','save');
  document.getElementById('mc').innerHTML='<div style="text-align:center;padding:50px;color:var(--cr3)"><span class="sp"></span> Loading...</div>';
  try{
    var res=await Promise.all([
      q('rooms',{order:'id.asc'}),q('room_pricing'),q('bookings',{order:'checkin.asc'}),
      q('drinks',{order:'id.asc'}),q('food',{order:'id.asc'}),q('revenue',{order:'date.desc'}),
      q('occupancy_log',{order:'date.asc'}),q('bar_sales',{order:'created_at.desc'}),q('shrinkage',{order:'created_at.desc'}),
    ]);
    if(res[0].error) throw new Error(res[0].error.msg);
    D.rooms=res[0].data||[];D.pricing={};(res[1].data||[]).forEach(function(p){D.pricing[p.type]=p;});
    D.bookings=res[2].data||[];D.drinks=res[3].data||[];D.food=res[4].data||[];
    D.revenue=res[5].data||[];D.occ=res[6].data||[];D.barSales=res[7].data||[];D.shrinkage=res[8].data||[];
    setSt('Live','live');render();startPoll();
  }catch(e){
    setSt('Error','err');
    document.getElementById('mc').innerHTML='<div style="padding:40px;text-align:center;color:var(--rd)">'+e.message+'<br><br><button class="btn btn-g" id="retry-btn">Retry</button></div>';
    var rb=document.getElementById('retry-btn');if(rb)rb.addEventListener('click',loadAll);
  }
}
var pollTimer=null;
function startPoll(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async function(){
    // Don't poll if modal is open (would clobber user's input)
    if(document.getElementById('ov').classList.contains('open'))return;
    try{
      var res=await Promise.all([
        q('rooms',{order:'id.asc'}),q('bookings',{order:'checkin.asc'}),q('drinks',{order:'id.asc'}),
        q('food',{order:'id.asc'}),q('revenue',{order:'date.desc'}),q('occupancy_log',{order:'date.asc'}),
        q('room_pricing'),q('bar_sales',{order:'created_at.desc'}),q('shrinkage',{order:'created_at.desc'}),
      ]);
      if(res[0].data)D.rooms=res[0].data;if(res[1].data)D.bookings=res[1].data;if(res[2].data)D.drinks=res[2].data;
      if(res[3].data)D.food=res[3].data;if(res[4].data)D.revenue=res[4].data;if(res[5].data)D.occ=res[5].data;
      if(res[6].data){D.pricing={};res[6].data.forEach(function(p){D.pricing[p.type]=p;});}
      if(res[7].data)D.barSales=res[7].data;if(res[8].data)D.shrinkage=res[8].data;
      setSt('Live','live');render();
    }catch(e){setSt('Sync error','err');}
  },8000);
}

function render(){
  var mc=document.getElementById('mc');
  if(TAB==='ov')mc.innerHTML=buildOv();
  else if(TAB==='cal')mc.innerHTML=buildCal();
  else if(TAB==='bar')mc.innerHTML=buildBar();
  else if(TAB==='barsales')mc.innerHTML=buildBarSales();
  else if(TAB==='kit')mc.innerHTML=buildKit();
  else if(TAB==='rev')mc.innerHTML=buildRev();
  wireContent();
}
function wireContent(){
  var mc=document.getElementById('mc');if(!mc)return;
  mc.querySelectorAll('[data-action]').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();handleAction(el.dataset.action,el.dataset);});
  });
  mc.querySelectorAll('[data-day]').forEach(function(el){
    el.addEventListener('click',function(){openCalDay(el.dataset.day);});
  });
}
function handleAction(a,ds){
  if(a==='rm-bk')rmBk(parseInt(ds.id));
  else if(a==='rm-room')rmRoom(parseInt(ds.id));
  else if(a==='rm-drink')rmDrink(parseInt(ds.id));
  else if(a==='rm-food')rmFood(parseInt(ds.id));
  else if(a==='rm-rev')rmRev(parseInt(ds.id));
  else if(a==='rm-sale')rmSale(parseInt(ds.id));
  else if(a==='rm-shrink')rmShrink(parseInt(ds.id));
  else if(a==='upd-drink')openUpdDrink(parseInt(ds.id));
  else if(a==='upd-food')updFood(parseInt(ds.id));
  else if(a==='edit-drink')openEditDrink(parseInt(ds.id));
  else if(a==='edit-food')openEditFood(parseInt(ds.id));
  else if(a==='sort-bar'){
    if(BAR_SORT.col===ds.col){BAR_SORT.dir=BAR_SORT.dir==='asc'?'desc':'asc';}
    else{BAR_SORT.col=ds.col;BAR_SORT.dir='asc';}
    render();
  }
  else if(a==='sort-kit'){
    if(KIT_SORT.col===ds.col){KIT_SORT.dir=KIT_SORT.dir==='asc'?'desc':'asc';}
    else{KIT_SORT.col=ds.col;KIT_SORT.dir='asc';}
    render();
  }
  else if(a==='new-bk')openBkM(null);
  else if(a==='add-room')openAddRoom();
  else if(a==='edit-pr')openPrM();
  else if(a==='log-rev')openRevM();
  else if(a==='add-drink')openAddDrink();
  else if(a==='add-food')openAddFood();
  else if(a==='cal-prev'){CM--;if(CM<0){CM=11;CY--;}render();}
  else if(a==='cal-next'){CM++;if(CM>11){CM=0;CY++;}render();}
}
function openM(h){
  document.getElementById('mb').innerHTML=h;
  document.getElementById('ov').classList.add('open');
  document.getElementById('mb').querySelectorAll('[data-maction]').forEach(function(el){
    el.addEventListener('click',function(e){e.stopPropagation();handleMA(el.dataset.maction,el.dataset);});
  });
  document.getElementById('ov').onclick=function(e){if(e.target===document.getElementById('ov'))closeM();};
}
function closeM(){document.getElementById('ov').classList.remove('open');}
function handleMA(a,ds){

  else if(a==='sv-add-room')svAddRoom();
  else if(a==='sv-drink')svDrink();
  else if(a==='sv-food')svFood();
  else if(a==='sv-rev')svRev();

// ── OVERVIEW ─────────────────────────────────────────────────────
function buildOv(){
  var ts=td(),todayBks=bon(ts),occ=todayBks.length,tot=D.rooms.length||10;
  var vac=Math.max(0,tot-occ),pct=tot>0?Math.round(occ/tot*100):0;
  var lowD=D.drinks.filter(function(d){return stk(d.stock,d.min_level)!=='ok';}).length;
  var lowF=D.food.filter(function(f){return stk(f.stock,f.min_level)!=='ok';}).length;
  var rev=D.revenue.find(function(r){return r.date===ts;});
  // Total today revenue = auto bar + auto room + manual food + swimming + snooker
  var barAutoToday=D.barSales.filter(function(s){return s.date===ts;}).reduce(function(sum,s){return sum+(s.total_revenue||0);},0);
  var roomAutoToday=D.bookings.filter(function(b){return b.checkin===ts;}).reduce(function(sum,b){var base=D.pricing[b.room_type]?D.pricing[b.room_type].per_night:0;var rate=b.custom_price!=null?b.custom_price:base;var n=nights(b.checkin,b.checkout);return sum+rate*n;},0);
  var foodToday=rev?rev.food_revenue:0;
  var swimToday=rev?rev.swimming_revenue:0;
  var snkToday=rev?rev.snooker_revenue:0;
  var tt=barAutoToday+roomAutoToday+foodToday+swimToday+snkToday;

  // Rolling 30-day avg occupancy
  var cutoff30=new Date(ts+'T12:00:00');cutoff30.setDate(cutoff30.getDate()-29);
  var days30=[];var dd=new Date(cutoff30);
  while(dd<=new Date(ts+'T12:00:00')){days30.push(dd.toISOString().split('T')[0]);dd.setDate(dd.getDate()+1);}
  var sum30=0,cnt30=0;
  days30.forEach(function(ds){
    var o=null;
    if(ds===ts)o=occ;
    else{var l=D.occ.find(function(x){return x.date===ds;});o=l?l.occupied:null;}
    if(o!==null){sum30+=Math.round(o/tot*100);cnt30++;}
  });
  var avg30pct=cnt30>0?Math.round(sum30/cnt30):0;

  // Shrinkage today
  var shrinkToday=D.shrinkage.filter(function(s){return s.date===ts;});
  var shrinkCost=shrinkToday.reduce(function(sum,s){return sum+(s.total_cost||0);},0);
  var totalShrinkQty=shrinkToday.reduce(function(sum,s){return sum+(s.quantity||0);},0);
  var totalSoldQty=D.barSales.filter(function(s){return s.date===ts;}).reduce(function(sum,s){return sum+(s.quantity||0);},0);
  var shrinkPct=totalSoldQty+totalShrinkQty>0?Math.round(totalShrinkQty/(totalSoldQty+totalShrinkQty)*100):0;
  var shrinkAlert=shrinkPct>10&&totalShrinkQty>0;

  var uc=D.bookings.filter(function(b){return b.checkin>ts;}).length;
  var alH='';
  if(shrinkAlert) alH+='<div class="al alp"><b>&#9888; Shrinkage alert:</b> '+shrinkPct+'% of bar movement today is shrinkage ('+totalShrinkQty+' units, &#8358;'+f(shrinkCost)+' cost). Review bar_sales report.</div>';
  D.drinks.filter(function(d){return stk(d.stock,d.min_level)!=='ok';}).forEach(function(d){alH+='<div class="al '+(stk(d.stock,d.min_level)==='out'?'alo':'alw')+'"><b>Bar:</b> '+d.name+' &mdash; '+(stk(d.stock,d.min_level)==='out'?'out of stock':'below minimum')+'</div>';});
  D.food.filter(function(f){return stk(f.stock,f.min_level)!=='ok';}).forEach(function(f){alH+='<div class="al '+(stk(f.stock,f.min_level)==='out'?'alo':'alw')+'"><b>Kitchen:</b> '+f.name+' &mdash; '+(stk(f.stock,f.min_level)==='out'?'out of stock':'below minimum')+'</div>';});
  if(!alH)alH='<p style="font-size:12px;color:var(--cr3);padding:6px 0">All good &mdash; no alerts</p>';
  var rmH='';
  D.rooms.forEach(function(r){var bk=bon(ts).find(function(b){return b.room_num===r.num;});var st=bk?'occupied':'vacant',gl=bk?bk.guest:'Available';rmH+='<div class="rc '+st+'"><div class="rn">'+r.num+'</div><div class="rt">'+r.type+'</div><div class="rg">'+gl+'</div><div class="rdot '+st+'"></div></div>';});
  return '<div class="mgrid">'+
    '<div class="metric"><div class="mlbl">Today occupied</div><div class="mval">'+occ+'<span style="font-size:14px;color:var(--cr3)">/'+tot+'</span></div><div class="pb"><div class="pf" style="width:'+pct+'%"></div></div><div class="msub">'+pct+'% today</div></div>'+
    '<div class="metric"><div class="mlbl">30-day avg occ.</div><div class="mval" style="color:var(--bl)">'+avg30pct+'%</div><div class="msub">Rolling 30 days</div></div>'+
    '<div class="metric"><div class="mlbl">Vacant today</div><div class="mval" style="color:var(--gn)">'+vac+'</div><div class="msub">Available</div></div>'+
    '<div class="metric"><div class="mlbl">Stock alerts</div><div class="mval" style="color:'+(lowD+lowF>0?'var(--gl)':'var(--gn)')+'">'+( lowD+lowF)+'</div><div class="msub">'+lowD+' bar &bull; '+lowF+' kit</div></div>'+
    '<div class="metric"><div class="mlbl">Upcoming bkgs</div><div class="mval" style="color:var(--bl)">'+uc+'</div><div class="msub">Future</div></div>'+
    '<div class="metric"><div class="mlbl">Today revenue</div><div class="mval" style="font-size:15px">&#8358;'+f(tt)+'</div><div class="msub">All sources</div></div>'+
    (shrinkAlert?'<div class="metric" style="border-top-color:var(--pu)"><div class="mlbl">Shrinkage today</div><div class="mval" style="font-size:15px;color:var(--pu)">&#8358;'+f(shrinkCost)+'</div><div class="msub">'+shrinkPct+'% of bar mvmt</div></div>':'')+
    '</div>'+buildWeek()+
    '<div class="card"><div class="ch"><span class="ct">Alerts</span></div>'+alH+'</div>'+
    '<div class="card"><div class="ch"><span class="ct">Room snapshot &mdash; today</span></div><div class="rgrid">'+rmH+'</div></div>';
}

function buildWeek(){
  var ts=td(),tot=D.rooms.length||10;

  // ── Rolling 30 days bar chart ──
  var days30=[],d=new Date(ts+'T12:00:00');
  for(var i=29;i>=0;i--){var dd=new Date(d);dd.setDate(d.getDate()-i);days30.push(dd.toISOString().split('T')[0]);}
  var occ30=days30.map(function(ds){
    if(ds===ts)return{ds:ds,pct:Math.round(bon(ts).length/tot*100)};
    var l=D.occ.find(function(x){return x.date===ds;});
    return{ds:ds,pct:l?Math.round(l.occupied/tot*100):null};
  });
  var valid30=occ30.filter(function(x){return x.pct!==null;});
  var avg30=valid30.length?Math.round(valid30.reduce(function(s,x){return s+x.pct;},0)/valid30.length):null;
  // Mini bars for 30 days (show every label would be too crowded — skip most)
  var bars30=occ30.map(function(x,idx){
    var h=x.pct!==null?Math.max(3,x.pct*.68):3;
    var col=x.ds===ts?'var(--gold)':x.pct!==null?'var(--gd)':'var(--bg4)';
    var lbl=idx%5===0||x.ds===ts?new Date(x.ds+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
    return '<div class="wc" style="min-width:0;flex:1"><div class="wp" style="font-size:8px">'+(x.ds===ts?x.pct+'%':'')+'</div><div class="wb" style="height:'+h+'px;background:'+col+'"></div><div class="wl" style="font-size:8px">'+lbl+'</div></div>';
  }).join('');

  // ── 4-week WoW table ──
  // Get Mon-Sun for last 4 complete weeks + current WTD
  function getWeekBounds(weeksAgo){
    var d=lagosNow();
    var day=d.getDay(),diff=day===0?6:day-1;
    d.setDate(d.getDate()-diff-(weeksAgo*7));
    var mon=d.toISOString().split('T')[0];
    var sun=new Date(d);sun.setDate(d.getDate()+6);
    var sunStr=sun.toISOString().split('T')[0];
    return{mon:mon,sun:sunStr};
  }
  function weekOccPct(mon,sun){
    var days=[],d=new Date(mon+'T12:00:00'),e=new Date(sun+'T12:00:00');
    while(d<=e){days.push(d.toISOString().split('T')[0]);d.setDate(d.getDate()+1);}
    var sum=0,cnt=0;
    days.forEach(function(ds){
      if(ds>ts)return;
      var o=null;
      if(ds===ts)o=bon(ts).length;
      else{var l=D.occ.find(function(x){return x.date===ds;});o=l?l.occupied:null;}
      if(o!==null){sum+=Math.round(o/tot*100);cnt++;}
    });
    return cnt>0?Math.round(sum/cnt):null;
  }
  var weeks=[];
  for(var w=3;w>=0;w--){
    var b=getWeekBounds(w);
    var pct=weekOccPct(b.mon,b.sun);
    var monLbl=new Date(b.mon+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    var sunLbl=new Date(b.sun+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    weeks.push({label:monLbl+'&ndash;'+sunLbl,pct:pct,current:w===0});
  }
  var wowRows=weeks.map(function(wk,idx){
    var prev=idx>0?weeks[idx-1].pct:null;
    var chg=wk.pct!==null&&prev!==null?wk.pct-prev:null;
    var chgHtml=chg!==null?'<span style="color:'+(chg>0?'var(--gn)':chg<0?'var(--rd)':'var(--cr3)')+';">'+(chg>0?'&#9650;':'&#9660;')+Math.abs(chg)+'pp</span>':'&mdash;';
    var barW=wk.pct!==null?wk.pct:0;
    return '<tr>'+
      '<td style="color:'+(wk.current?'var(--gold)':'var(--cr)')+';font-weight:'+(wk.current?'500':'400')+'">'+wk.label+(wk.current?' <span style="font-size:9px;color:var(--gold)">(WTD)</span>':'')+'</td>'+
      '<td><div style="display:flex;align-items:center;gap:8px">'+
      '<div style="flex:1;background:var(--bg4);border-radius:2px;height:6px;overflow:hidden"><div style="width:'+barW+'%;height:100%;border-radius:2px;background:'+(wk.current?'var(--gold)':'var(--gd)')+'"></div></div>'+
      '<span style="min-width:35px;color:'+(wk.current?'var(--gold)':'var(--cr)')+'">'+( wk.pct!==null?wk.pct+'%':'&mdash;')+'</span></div></td>'+
      '<td style="text-align:right">'+chgHtml+'</td></tr>';
  }).join('');

  return '<div class="card"><div class="ch"><span class="ct">Rolling 30-day occupancy</span><span style="font-size:11px;color:var(--cr3)">30d avg: <span style="color:var(--gold)">'+(avg30!==null?avg30+'%':'&mdash;')+'</span></span></div><div class="ww" style="height:68px">'+bars30+'</div></div>'+
    '<div class="card"><div class="ch"><span class="ct">4-week occupancy (WoW)</span></div>'+
    '<table><thead><tr><th>Week</th><th>Avg occupancy</th><th style="text-align:right">vs prior week</th></tr></thead><tbody>'+wowRows+'</tbody></table></div>';
}

// ── BAR ───────────────────────────────────────────────────────────
function buildBar(){
  var tw=D.drinks.reduce(function(s,i){return s+(i.wholesale_price||0)*i.stock;},0);
  var tr=D.drinks.reduce(function(s,i){return s+(i.retail_price||0)*i.stock;},0);
  // Sort drinks
  var sorted=D.drinks.slice().sort(function(a,b){
    var av,bv;
    if(BAR_SORT.col==='name'){av=(a.name||'').toLowerCase();bv=(b.name||'').toLowerCase();}
    else if(BAR_SORT.col==='category'){av=(a.category||'').toLowerCase();bv=(b.category||'').toLowerCase();}
    else if(BAR_SORT.col==='stock'){av=a.stock||0;bv=b.stock||0;}
    else if(BAR_SORT.col==='wholesale'){av=a.wholesale_price||0;bv=b.wholesale_price||0;}
    else if(BAR_SORT.col==='retail'){av=a.retail_price||0;bv=b.retail_price||0;}
    else if(BAR_SORT.col==='margin'){
      av=a.wholesale_price>0?(a.retail_price-a.wholesale_price)/a.wholesale_price:0;
      bv=b.wholesale_price>0?(b.retail_price-b.wholesale_price)/b.wholesale_price:0;
    }
    else{av=a.id;bv=b.id;}
    if(av<bv) return BAR_SORT.dir==='asc'?-1:1;
    if(av>bv) return BAR_SORT.dir==='asc'?1:-1;
    return 0;
  });
  var rows='';
  sorted.forEach(function(i){
    var s=stk(i.stock,i.min_level),m=i.wholesale_price>0?Math.round((i.retail_price-i.wholesale_price)/i.wholesale_price*100):0;
    rows+='<tr><td style="width:18%">'+i.name+'</td><td style="width:9%;color:var(--cr3)">'+i.category+'</td>'+
      '<td style="width:155px;min-width:155px"><div style="display:flex;align-items:center;gap:6px;flex-wrap:nowrap">'+
      '<input type="number" id="ds-'+i.id+'" value="'+i.stock+'" style="width:60px;padding:5px 6px;font-size:12px;text-align:center;flex-shrink:0">'+
      '<button class="btn btn-g btn-s" data-action="upd-drink" data-id="'+i.id+'" style="padding:5px 10px;font-size:11px;white-space:nowrap;flex-shrink:0">Update</button>'+
      '</div></td>'+
      '<td style="width:7%;color:var(--cr3)">'+i.unit+'</td>'+
      '<td style="width:10%;color:var(--cr3)">&#8358;'+f(i.wholesale_price||0)+'</td>'+
      '<td style="width:10%;color:var(--gold)">&#8358;'+f(i.retail_price||0)+'</td>'+
      '<td style="width:6%;color:var(--gn)">'+m+'%</td>'+
      '<td style="width:65px">'+bdg(s)+'</td>'+
      '<td style="width:70px;text-align:right;white-space:nowrap">'+

// ── BAR SALES ─────────────────────────────────────────────────────
function buildBarSales(){
  var ts=td();
  // Today summary
  var todaySales=D.barSales.filter(function(s){return s.date===ts;});
  var todayRev=todaySales.reduce(function(sum,s){return sum+(s.total_revenue||0);},0);
  var todayUnits=todaySales.reduce(function(sum,s){return sum+(s.quantity||0);},0);
  var todayShrink=D.shrinkage.filter(function(s){return s.date===ts;});
  var shrinkCost=todayShrink.reduce(function(sum,s){return sum+(s.total_cost||0);},0);
  var shrinkUnits=todayShrink.reduce(function(sum,s){return sum+(s.quantity||0);},0);
  var shrinkPct=todayUnits+shrinkUnits>0?Math.round(shrinkUnits/(todayUnits+shrinkUnits)*100):0;

  // Item breakdown (last 30 days)
  var itemMap={};
  D.barSales.forEach(function(s){
    if(!itemMap[s.drink_name])itemMap[s.drink_name]={name:s.drink_name,qty:0,rev:0};
    itemMap[s.drink_name].qty+=s.quantity||0;
    itemMap[s.drink_name].rev+=s.total_revenue||0;
  });
  var items=Object.values(itemMap).sort(function(a,b){return b.rev-a.rev;});
  var itemRows=items.length?items.map(function(i){
    return '<tr><td>'+i.name+'</td><td style="color:var(--cr3)">'+i.qty+' units</td><td style="color:var(--gold)">&#8358;'+f(i.rev)+'</td></tr>';
  }).join(''):'<tr><td colspan="3" style="text-align:center;color:var(--cr3);padding:16px">No sales recorded yet. Use the Bar tab to update stock.</td></tr>';

  // Individual sales log (last 50 entries) - each deletable
  var allSales=D.barSales.slice(0,50);
  var saleRows=allSales.length?allSales.map(function(s){
    var dl=new Date(s.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    return '<tr><td style="width:90px;color:var(--cr3)">'+dl+'</td>'+
      '<td>'+s.drink_name+'</td>'+
      '<td style="width:70px;color:var(--gn)">'+s.quantity+'</td>'+
      '<td style="width:90px;color:var(--cr3)">&#8358;'+f(s.unit_retail_price)+'</td>'+
      '<td style="width:100px;color:var(--gold)">&#8358;'+f(s.total_revenue)+'</td>'+
      '<td style="width:32px;text-align:right"><button class="btn btn-s btn-d" data-action="rm-sale" data-id="'+s.id+'" style="padding:2px 7px">&#10005;</button></td></tr>';
  }).join(''):'<tr><td colspan="6" style="text-align:center;color:var(--cr3);padding:16px">No sales recorded yet. Use the Bar tab to update stock.</td></tr>';

  // Daily summary (last 30 days, read-only summary)
  var dayMap={};
  D.barSales.forEach(function(s){if(!dayMap[s.date])dayMap[s.date]={date:s.date,rev:0,units:0};dayMap[s.date].rev+=s.total_revenue||0;dayMap[s.date].units+=s.quantity||0;});
  D.shrinkage.forEach(function(s){if(!dayMap[s.date])dayMap[s.date]={date:s.date,rev:0,units:0,shrink:0,shrinkCost:0};if(!dayMap[s.date].shrink)dayMap[s.date].shrink=0;if(!dayMap[s.date].shrinkCost)dayMap[s.date].shrinkCost=0;dayMap[s.date].shrink+=s.quantity||0;dayMap[s.date].shrinkCost+=s.total_cost||0;});
  var days=Object.values(dayMap).sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,30);
  var dayRows=days.length?days.map(function(d){
    var dl=new Date(d.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    var shrinkPctD=d.units+(d.shrink||0)>0?Math.round((d.shrink||0)/(d.units+(d.shrink||0))*100):0;
    var flag=shrinkPctD>10&&(d.shrink||0)>0?'<span class="shrink-badge">&#9888; '+shrinkPctD+'% shrink</span>':'';
    return '<div class="rrow"><span style="color:var(--cr3)">'+dl+'</span>'+
      '<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">'+
      '<span style="color:var(--gn)">'+d.units+' sold</span>'+
      '<span style="color:var(--gold)">&#8358;'+f(d.rev)+'</span>'+
      ((d.shrink||0)>0?'<span style="color:var(--pu)">'+d.shrink+' shrinkage (&#8358;'+f(d.shrinkCost||0)+')</span>':'')+''+flag+
      '</div></div>';
  }).join(''):'<p style="font-size:12px;color:var(--cr3);padding:8px 0">No sales data yet.</p>';

  // All shrinkage (last 30 entries) - deletable
  var allShrink=D.shrinkage.slice(0,30);
  var shrinkRows=allShrink.length?allShrink.map(function(s){
    var dl=new Date(s.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
    return '<tr><td style="width:90px;color:var(--cr3)">'+dl+'</td><td>'+s.drink_name+'</td>'+
      '<td style="width:70px;color:var(--pu)">'+s.quantity+'</td>'+
      '<td style="width:110px;color:var(--cr3)">'+s.reason+'</td>'+
      '<td style="width:100px;color:var(--rd)">&#8358;'+f(s.total_cost)+'</td>'+
      '<td style="width:32px;text-align:right"><button class="btn btn-s btn-d" data-action="rm-shrink" data-id="'+s.id+'" style="padding:2px 7px">&#10005;</button></td></tr>';
  }).join(''):'<tr><td colspan="6" style="text-align:center;color:var(--cr3);padding:12px">No shrinkage recorded</td></tr>';

  return '<div class="mgrid">'+
    '<div class="metric"><div class="mlbl">Today sales rev.</div><div class="mval" style="font-size:17px;color:var(--gn)">&#8358;'+f(todayRev)+'</div><div class="msub">'+todayUnits+' units sold</div></div>'+
    '<div class="metric"><div class="mlbl">Today shrinkage</div><div class="mval" style="font-size:17px;color:var(--pu)">&#8358;'+f(shrinkCost)+'</div><div class="msub">'+shrinkUnits+' units, '+shrinkPct+'% of mvmt</div></div>'+
    (shrinkPct>10&&shrinkUnits>0?'<div class="metric" style="border-top-color:var(--rd)"><div class="mlbl">&#9888; Shrinkage alert</div><div class="mval" style="font-size:17px;color:var(--rd)">'+shrinkPct+'%</div><div class="msub">Exceeds 10% threshold</div></div>':'')+
    '</div>'+
    '<div class="card"><div class="ch"><span class="ct">Top selling items (all time)</span></div>'+
    '<div style="overflow-x:auto"><table><thead><tr><th>Item</th><th>Units sold</th><th>Revenue</th></tr></thead><tbody>'+itemRows+'</tbody></table></div></div>'+
    '<div class="card"><div class="ch"><span class="ct">Daily summary (last 30 days)</span></div>'+dayRows+'</div>'+
    '<div class="card"><div class="ch"><span class="ct">Sales log &mdash; individual entries</span><span style="font-size:11px;color:var(--cr3)">Last 50 entries</span></div>'+
    '<div style="overflow-x:auto"><table style="table-layout:auto;min-width:580px"><thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>Unit price</th><th>Total</th><th></th></tr></thead><tbody>'+saleRows+'</tbody></table></div></div>'+
    '<div class="card"><div class="ch"><span class="ct">Shrinkage log</span><span style="font-size:11px;color:var(--cr3)">Last 30 entries</span></div>'+
    '<div style="overflow-x:auto"><table style="table-layout:auto;min-width:580px"><thead><tr><th>Date</th><th>Item</th><th>Qty</th><th>Reason</th><th>Cost</th><th></th></tr></thead><tbody>'+shrinkRows+'</tbody></table></div></div>';
}

// ── REVENUE ───────────────────────────────────────────────────────
function buildRev(){
  var ts=td();
  // Bar and room revenue are auto — show combined last 30 days
  var l30=D.revenue.slice(0,30);
  var totFood=l30.reduce(function(s,r){return s+(r.food_revenue||0);},0);
  var totSwim=l30.reduce(function(s,r){return s+(r.swimming_revenue||0);},0);
  var totSnk=l30.reduce(function(s,r){return s+(r.snooker_revenue||0);},0);
  // Auto bar last 30 days
  var barDates={};D.barSales.forEach(function(s){if(!barDates[s.date])barDates[s.date]=0;barDates[s.date]+=s.total_revenue||0;});
  var totBar=Object.values(barDates).reduce(function(s,v){return s+v;},0);
  // Auto room last 30 days (checkin in last 30 days)
  var cutoff=new Date(ts);cutoff.setDate(cutoff.getDate()-30);var cutStr=cutoff.toISOString().split('T')[0];
  var totRoom=D.bookings.filter(function(b){return b.checkin>=cutStr;}).reduce(function(sum,b){var base=D.pricing[b.room_type]?D.pricing[b.room_type].per_night:0;var rate=b.custom_price!=null?b.custom_price:base;return sum+rate*nights(b.checkin,b.checkout);},0);

  var rows='';
  if(l30.length){
    l30.forEach(function(r){
      var dl=new Date(r.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
      var barAuto=barDates[r.date]||0;
      var roomAuto=D.bookings.filter(function(b){return b.checkin===r.date;}).reduce(function(sum,b){var base=D.pricing[b.room_type]?D.pricing[b.room_type].per_night:0;var rate=b.custom_price!=null?b.custom_price:base;return sum+rate*nights(b.checkin,b.checkout);},0);
      var total=(r.food_revenue||0)+(r.swimming_revenue||0)+(r.snooker_revenue||0)+barAuto+roomAuto;
      rows+='<div class="rrow"><span style="color:var(--cr3)">'+dl+'</span>'+
        '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:11px">'+
        (barAuto>0?'<span style="color:var(--gold)" title="Bar (auto)">Bar &#8358;'+f(barAuto)+'</span>':'')+''+
        (roomAuto>0?'<span style="color:var(--bl)" title="Rooms (auto)">Rooms &#8358;'+f(roomAuto)+'</span>':'')+''+
        (r.food_revenue>0?'<span style="color:var(--gn)">Food &#8358;'+f(r.food_revenue)+'</span>':'')+''+
        (r.swimming_revenue>0?'<span style="color:var(--cr2)">Swim &#8358;'+f(r.swimming_revenue)+'</span>':'')+''+
        (r.snooker_revenue>0?'<span style="color:var(--cr2)">Snooker &#8358;'+f(r.snooker_revenue)+'</span>':'')+''+
        '<span style="font-weight:500">Total &#8358;'+f(total)+'</span>'+
        '<button class="btn btn-s btn-d" data-action="rm-rev" data-id="'+r.id+'" style="padding:2px 7px">&#10005;</button>'+
        '</div></div>';
    });
  } else {rows='<p style="font-size:12px;color:var(--cr3);padding:8px 0">No manual revenue logged yet.</p>';}

  return '<div class="mgrid">'+
    '<div class="metric"><div class="mlbl">Bar (30d, auto)</div><div class="mval" style="font-size:15px;color:var(--gold)">&#8358;'+f(totBar)+'</div><div class="msub">From stock updates</div></div>'+
    '<div class="metric"><div class="mlbl">Rooms (30d, auto)</div><div class="mval" style="font-size:15px;color:var(--bl)">&#8358;'+f(totRoom)+'</div><div class="msub">From bookings</div></div>'+
    '<div class="metric"><div class="mlbl">Food (30d)</div><div class="mval" style="font-size:15px;color:var(--gn)">&#8358;'+f(totFood)+'</div></div>'+
    '<div class="metric"><div class="mlbl">Swimming (30d)</div><div class="mval" style="font-size:15px">&#8358;'+f(totSwim)+'</div></div>'+
    '<div class="metric"><div class="mlbl">Snooker (30d)</div><div class="mval" style="font-size:15px">&#8358;'+f(totSnk)+'</div></div>'+
    '<div class="metric"><div class="mlbl">Total (30d)</div><div class="mval" style="font-size:15px;color:var(--gn)">&#8358;'+f(totBar+totRoom+totFood+totSwim+totSnk)+'</div></div>'+
    '</div>'+
    '<div class="card"><div class="ch"><span class="ct">Revenue log (30 days)</span><button class="btn btn-g btn-s" data-action="log-rev">+ Log today</button></div>'+
    '<p style="font-size:11px;color:var(--cr3);margin-bottom:12px">Bar and room revenue update automatically. Manually log food, swimming and snooker.</p>'+
    rows+'</div>';
}

// ── MODALS ────────────────────────────────────────────────────────
function openUpdDrink(id){
  var item=D.drinks.find(function(i){return i.id===id;});
  if(!item)return;
  var el=document.getElementById('ds-'+id);
  var newVal=el?parseFloat(el.value):item.stock;
  if(isNaN(newVal)||newVal<0){alert('Please enter a valid stock number.');return;}
  newVal=Math.round(newVal*100)/100;
  var diff=Math.round((item.stock-newVal)*100)/100;

  if(diff===0){
    // No change
    alert('Stock is already '+item.stock+'. Change the number first.');
    return;
  }
  if(diff<0){
    // Stock increased — just update, no shrinkage
    if(confirm('Increase stock from '+item.stock+' to '+newVal+' (+'+Math.abs(diff)+' '+item.unit+')? No sale will be recorded for a stock increase.')){
      svUpdDrinkDirect(id,newVal,0,0,'',item);
    }
    return;
  }
  // Stock reduced — open shrinkage dialog. Store newVal and diff in modal data attributes so they can't get lost.
  openM('<div class="mtitle" data-newval="'+newVal+'" data-diff="'+diff+'">Stock update &mdash; '+item.name+'</div>'+
    '<p style="font-size:12px;color:var(--cr3);margin-bottom:14px">Reducing from <b style="color:var(--gold)">'+item.stock+'</b> to <b style="color:var(--gold)">'+newVal+'</b> &mdash; a reduction of <b style="color:var(--gold)">'+diff+' '+item.unit+'(s)</b>.<br>Split into <b>sold</b> vs <b>shrinkage</b> (must add up to '+diff+').</p>'+
    '<div class="rev-section">'+
    '<div class="rev-section-title">Sales breakdown</div>'+
    '<div class="fg2">'+
    '<div class="fg"><label class="fl">Units sold (&#8358;'+f(item.retail_price)+'/unit)</label>'+
    '<input type="number" id="sd-sold" value="'+diff+'" min="0" step="0.5"></div>'+
    '<div class="fg"><label class="fl">Units shrinkage (theft / spill / comp)</label>'+
    '<input type="number" id="sd-shrink" value="0" min="0" step="0.5"></div>'+
    '</div>'+
    '<div class="fg"><label class="fl">Shrinkage reason (if any)</label>'+
    '<select id="sd-reason"><option>Theft</option><option>Spillage</option><option>Complimentary</option><option>Breakage</option><option>Other</option></select></div>'+
    '<div id="sd-preview" style="font-size:12px;color:var(--cr3);margin-top:8px;padding:10px;background:var(--bg);border-radius:4px;line-height:1.8">'+
    'Sales revenue: <b style="color:var(--gn)">&#8358;'+f(diff*item.retail_price)+'</b> &bull; Shrinkage cost: <b style="color:var(--pu)">&#8358;0</b> <span style="color:var(--gn)">&#10003;</span>'+
    '</div></div>'+
    '<div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">'+
    '<button class="btn btn-s" data-maction="close">Cancel</button>'+
    '<button class="btn btn-g btn-s" data-maction="sv-upd-drink" data-id="'+id+'" data-newval="'+newVal+'" data-diff="'+diff+'">Confirm &amp; save</button></div>');
  function updatePreview(){
    var sold=parseFloat(document.getElementById('sd-sold').value)||0;
    var shrink=parseFloat(document.getElementById('sd-shrink').value)||0;
    var total=Math.round((sold+shrink)*100)/100;
    var ok=Math.abs(total-diff)<0.01;
    var prev=document.getElementById('sd-preview');
    if(prev) prev.innerHTML='Sales revenue: <b style="color:var(--gn)">&#8358;'+f(sold*item.retail_price)+'</b> &bull; Shrinkage cost: <b style="color:var(--pu)">&#8358;'+f(shrink*(item.wholesale_price||0))+'</b>'+
      (ok?'<span style="color:var(--gn)"> &#10003; Total: '+total+'</span>':'<span style="color:var(--rd)"> &#10005; Must total '+diff+' (currently '+total+')</span>');
  }
  var s1=document.getElementById('sd-sold'),s2=document.getElementById('sd-shrink');
  if(s1)s1.addEventListener('input',updatePreview);
  if(s2)s2.addEventListener('input',updatePreview);
  updatePreview();
}

async function svUpdDrink(id){
  var item=D.drinks.find(function(i){return i.id===id;});if(!item)return;
  // Get newVal and diff from the modal save button's data attributes (set when modal opened)
  var btn=document.querySelector('[data-maction="sv-upd-drink"]');
  var newVal,diff;
  if(btn&&btn.dataset.newval!==undefined&&btn.dataset.diff!==undefined){
    newVal=parseFloat(btn.dataset.newval);
    diff=parseFloat(btn.dataset.diff);
  } else {
    // Fallback: read from bar table input
    var el=document.getElementById('ds-'+id);
    newVal=el?parseFloat(el.value):item.stock;
    diff=Math.round((item.stock-newVal)*100)/100;
  }
  var sold=parseFloat(document.getElementById('sd-sold').value)||0;
  var shrink=parseFloat(document.getElementById('sd-shrink').value)||0;
  var reason=document.getElementById('sd-reason').value;
  var total=Math.round((sold+shrink)*100)/100;
  if(Math.abs(total-diff)>0.01){
    alert('Sold ('+sold+') + Shrinkage ('+shrink+') must equal '+diff+'. Currently totals '+total+'. Please adjust.');
    return;
  }
  await svUpdDrinkDirect(id,newVal,sold,shrink,reason,item);
}

async function svUpdDrinkDirect(id,newVal,sold,shrink,reason,item){
  if(!item)item=D.drinks.find(function(i){return i.id===id;});
  if(!item)return;
  closeM();setSt('Saving...','save');
  var ts=td();
  // Update stock
  await q('drinks',{method:'PATCH',filter:'id=eq.'+id,body:{stock:newVal}});
  // Log sale
  if(sold>0){
    var saleRev=sold*item.retail_price;
    await q('bar_sales',{method:'POST',body:{drink_id:id,drink_name:item.name,quantity:sold,unit_retail_price:item.retail_price,total_revenue:saleRev,date:ts}});
    // Auto-update revenue bar_auto_revenue for today
    await autoUpdateBarRevenue(ts,saleRev);
  }
  // Log shrinkage
  if(shrink>0){
    await q('shrinkage',{method:'POST',body:{drink_id:id,drink_name:item.name,quantity:shrink,reason:reason||'Other',unit_cost:item.wholesale_price||0,total_cost:shrink*(item.wholesale_price||0),date:ts}});
  }
  await refresh();
}

async function autoUpdateBarRevenue(date,addRev){
  var ex=await q('revenue',{filter:'date=eq.'+date,limit:'1'});
  if(ex.data&&ex.data.length){
    var cur=ex.data[0].bar_auto_revenue||0;
    await q('revenue',{method:'PATCH',filter:'date=eq.'+date,body:{bar_auto_revenue:cur+addRev}});
  } else {
    await q('revenue',{method:'POST',body:{date:date,food_revenue:0,drinks_revenue:0,swimming_revenue:0,snooker_revenue:0,bar_auto_revenue:addRev,room_auto_revenue:0}});
  }
}

async function autoUpdateRoomRevenue(date,addRev){
  var ex=await q('revenue',{filter:'date=eq.'+date,limit:'1'});
  if(ex.data&&ex.data.length){
    var cur=ex.data[0].room_auto_revenue||0;
    await q('revenue',{method:'PATCH',filter:'date=eq.'+date,body:{room_auto_revenue:cur+addRev}});
  } else {
    await q('revenue',{method:'POST',body:{date:date,food_revenue:0,drinks_revenue:0,swimming_revenue:0,snooker_revenue:0,bar_auto_revenue:0,room_auto_revenue:addRev}});
  }
}

function formatTime12(t){
  if(!t)return '';

  return h+':'+m+' '+ampm;
}

async function refresh(){
  try{
    var res=await Promise.all([
      q('rooms',{order:'id.asc'}),q('bookings',{order:'checkin.asc'}),q('drinks',{order:'id.asc'}),
      q('food',{order:'id.asc'}),q('revenue',{order:'date.desc'}),q('occupancy_log',{order:'date.asc'}),
      q('room_pricing'),q('bar_sales',{order:'created_at.desc'}),q('shrinkage',{order:'created_at.desc'}),
    ]);
    if(res[0].data)D.rooms=res[0].data;if(res[1].data)D.bookings=res[1].data;if(res[2].data)D.drinks=res[2].data;
    if(res[3].data)D.food=res[3].data;if(res[4].data)D.revenue=res[4].data;if(res[5].data)D.occ=res[5].data;
    if(res[6].data){D.pricing={};res[6].data.forEach(function(p){D.pricing[p.type]=p;});}
    if(res[7].data)D.barSales=res[7].data;if(res[8].data)D.shrinkage=res[8].data;
    setSt('Live','live');render();
  }catch(e){setSt('Sync error','err');}
}

  if(sale){
    // Reduce bar_auto_revenue for that date
    var ex=await q('revenue',{filter:'date=eq.'+sale.date,limit:'1'});
    if(ex.data&&ex.data.length){
      var newBar=Math.max(0,(ex.data[0].bar_auto_revenue||0)-(sale.total_revenue||0));

  }
  await q('bar_sales',{method:'DELETE',filter:'id=eq.'+id});
  await refresh();
}

}
async function svEditFood(id){
  var name=document.getElementById('ein').value.trim();
  if(!name){alert('Name is required.');return;}
  setSt('Saving...','save');
  await q('food',{method:'PATCH',filter:'id=eq.'+id,body:{
    name:name,
    category:document.getElementById('eic').value||'Other',
    unit:document.getElementById('eiu').value||'kg',
    stock:parseFloat(document.getElementById('eis').value)||0,
    min_level:parseFloat(document.getElementById('eim').value)||5
  }});
  closeM();await refresh();
}
async function svRev(){
  var date=document.getElementById('rd').value;
  var food=parseFloat(document.getElementById('rf').value)||0;
  var swim=parseFloat(document.getElementById('rsw').value)||0;
  var snk=parseFloat(document.getElementById('rsk').value)||0;
  setSt('Saving...','save');
  var ex=await q('revenue',{filter:'date=eq.'+date,limit:'1'});
  if(ex.data&&ex.data.length){
    await q('revenue',{method:'PATCH',filter:'date=eq.'+date,body:{food_revenue:food,swimming_revenue:swim,snooker_revenue:snk}});
  } else {
    await q('revenue',{method:'POST',body:{date:date,food_revenue:food,drinks_revenue:0,swimming_revenue:swim,snooker_revenue:snk,bar_auto_revenue:0,room_auto_revenue:0}});
  }
  closeM();await refresh();
}

  document.querySelectorAll('.tab').forEach(function(btn){

      TAB=btn.dataset.tab;closeM();
      document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
      btn.classList.add('on');render();
    });
  });

});
